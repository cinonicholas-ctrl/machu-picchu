name: Robot Machu Picchu

on:
  workflow_dispatch:
    inputs:
      circuito:
        description: "Qué actualizar"
        type: choice
        default: Todos
        options:
          - Todos
          - Circuito 1
          - Circuito 2
          - Circuito 3
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

# Evita que dos corridas del robot se pisen entre sí
concurrency:
  group: scrape-machupicchu
  cancel-in-progress: false

# Cada circuito corre en su PROPIO job = máquina e IP distinta.
# Van en secuencia (c1 -> c2 -> c3) solo para no chocar al guardar en el repo,
# pero cada uno entra con una IP nueva, así C2/C3 no heredan la IP quemada de C1.
jobs:
  c1:
    name: Circuito 1
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.circuito == 'Todos' || inputs.circuito == 'Circuito 1' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Recolectar Circuito 1
        continue-on-error: true
        run: CIRCUITS="Circuito 1" node scrape.js
      - name: Guardar datos
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Actualizar disponibilidad (C1)" || echo "sin cambios"
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push origin main && break
            echo "push falló, reintento..."; sleep 10
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: capture-c1
          path: capture.json

  c2:
    name: Circuito 2
    needs: c1
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.circuito == 'Todos' || inputs.circuito == 'Circuito 2') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Recolectar Circuito 2
        continue-on-error: true
        run: CIRCUITS="Circuito 2" node scrape.js
      - name: Guardar datos
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Actualizar disponibilidad (C2)" || echo "sin cambios"
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push origin main && break
            echo "push falló, reintento..."; sleep 10
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: capture-c2
          path: capture.json

  c3:
    name: Circuito 3
    needs: c2
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.circuito == 'Todos' || inputs.circuito == 'Circuito 3') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Recolectar Circuito 3
        continue-on-error: true
        run: CIRCUITS="Circuito 3" node scrape.js
      - name: Guardar datos
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Actualizar disponibilidad (C3)" || echo "sin cambios"
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push origin main && break
            echo "push falló, reintento..."; sleep 10
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: capture-c3
          path: capture.json
