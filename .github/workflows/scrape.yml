name: Robot Machu Picchu

on:
  workflow_dispatch:
    inputs:
      circuito:
        description: "Qué actualizar"
        type: choice
        default: Todos
        options:
          - Todos
          - Circuito 1
          - Circuito 2
          - Circuito 3
          - Solo bloqueados
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

concurrency:
  group: scrape-machupicchu
  cancel-in-progress: false

jobs:
  # 1) Decide qué combinaciones (circuito + mes) correr.
  #    "Solo bloqueados" lee data.json y devuelve solo los incompletos.
  setup:
    runs-on: ubuntu-latest
    outputs:
      combos: ${{ steps.gen.outputs.combos }}
      count: ${{ steps.gen.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - id: gen
        env:
          SEL: ${{ github.event.inputs.circuito || 'Todos' }}
        run: |
          COMBOS=$(SEL="$SEL" node plan.js)
          CNT=$(echo "$COMBOS" | node -e 'const fs=require("fs");console.log(JSON.parse(fs.readFileSync(0,"utf8")).length)')
          echo "combos=$COMBOS" >> "$GITHUB_OUTPUT"
          echo "count=$CNT" >> "$GITHUB_OUTPUT"
          echo "SEL=$SEL -> $CNT combinaciones"
          echo "$COMBOS"

  # 2) Una IP por (circuito + mes). Poca carga cada una -> menos bloqueos, todo en paralelo.
  scrape:
    needs: setup
    if: ${{ needs.setup.outputs.count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        combo: ${{ fromJSON(needs.setup.outputs.combos) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Recolectar ${{ matrix.combo.c }} / ${{ matrix.combo.m }}
        continue-on-error: true
        env:
          CIRCUITS: ${{ matrix.combo.c }}
          MONTH: ${{ matrix.combo.m }}
          OUT: slice.json
        run: |
          sleep $((RANDOM % 25))   # arranque escalonado para no golpear todos a la vez
          CIRCUITS="$CIRCUITS" MONTH="$MONTH" OUT=slice.json node scrape.js
      - name: Subir rebanada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slice-${{ matrix.combo.c }}-${{ matrix.combo.m }}
          path: slice.json
          if-no-files-found: ignore

  # 3) Junta todas las rebanadas en data.json y commitea una sola vez.
  merge:
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Descargar rebanadas
        uses: actions/download-artifact@v4
        with:
          path: slices
          pattern: slice-*
      - name: Juntar en data.json
        run: node merge.js slices/*/slice.json || true
      - name: Guardar en el dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Actualizar disponibilidad Machu Picchu" || echo "sin cambios"
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push origin main && break
            echo "push falló, reintento..."; sleep 10
          done
