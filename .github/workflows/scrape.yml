name: Robot Machu Picchu

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium

      - name: Circuito 1
        run: CIRCUITS="Circuito 1" node scrape.js
        continue-on-error: true
      - run: sleep 20

      - name: Circuito 2
        run: CIRCUITS="Circuito 2" node scrape.js
        continue-on-error: true
      - run: sleep 20

      - name: Circuito 3
        run: CIRCUITS="Circuito 3" node scrape.js
        continue-on-error: true

      - name: Guardar datos en el dashboard
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Actualizar disponibilidad Machu Picchu" || echo "sin cambios"
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: capture
          path: capture.json
