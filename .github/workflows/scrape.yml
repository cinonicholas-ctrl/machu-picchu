name: Robot Machu Picchu

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

# Evita que dos corridas se pisen (una a la vez)
concurrency:
  group: scrape-machupicchu
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium

      # Cada circuito reintenta hasta 3 veces; si falla, espera 5 min y reintenta
      - name: Circuito 1
        continue-on-error: true
        run: |
          for i in 1 2 3; do
            CIRCUITS="Circuito 1" node scrape.js && break
            echo "Circuito 1 intento $i falló; espero 5 min y reintento..."
            sleep 300
          done

      - name: Circuito 2
        continue-on-error: true
        run: |
          for i in 1 2 3; do
            CIRCUITS="Circuito 2" node scrape.js && break
            echo "Circuito 2 intento $i falló; espero 5 min y reintento..."
            sleep 300
          done

      - name: Circuito 3
        continue-on-error: true
        run: |
          for i in 1 2 3; do
            CIRCUITS="Circuito 3" node scrape.js && break
            echo "Circuito 3 intento $i falló; espero 5 min y reintento..."
            sleep 300
          done

      - name: Guardar datos en el dashboard
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Actualizar disponibilidad Machu Picchu" || echo "sin cambios"
          git pull --rebase -X ours origin main || true
          git push origin main || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: capture
          path: capture.json
