name: Robot Camino Inca

# Colector del Camino Inca (4D + 2D) desde inkatrail.com.pe.
# Independiente del robot de Machu Picchu (data.json): solo toca camino_inca.json.
# Va en .github/workflows/ del repo.

on:
  workflow_dispatch:        # botón "Run workflow" a mano
  schedule:
    - cron: '15 9 * * *'    # 1 vez al día (09:15 UTC ~ 04:15 Perú); el sitio refresca ~1/día

permissions:
  contents: write

concurrency:
  group: scrape-camino-inca
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Recolectar Camino Inca
        run: node camino_inca_scrape.js
      - name: Guardar en el dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add camino_inca.json
          git commit -m "Actualizar disponibilidad Camino Inca" || echo "sin cambios"
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push origin main && break
            echo "push falló, reintento..."; sleep 10
          done
