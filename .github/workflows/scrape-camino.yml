name: Robot Camino Inca

# Corre solo cada 6h (minuto 30, a propósito distinto del robot MP para no cruzarse)
# y también cuando lo lanzas a mano desde la pestaña Actions.
on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'

permissions:
  contents: write

concurrency:
  group: scrape-camino
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Recolectar disponibilidad
        run: node camino_inca_scrape.js

      - name: Guardar camino_inca.json en el repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add camino_inca.json
          git commit -m "Actualizar disponibilidad Camino Inca" || echo "sin cambios"
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push origin main && break
            echo "push falló, reintento..."; sleep 10
          done
