<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disponibilidad Machu Picchu</title>
<style>
  :root{
    --bg:#0f1419;--panel:#171e26;--panel2:#1e2731;--line:#2a3744;
    --txt:#e6edf3;--muted:#8aa0b2;--accent:#c8472b;
    --g1:#1a9850;--g2:#66bd63;--g3:#a6d96a;--y1:#fee08b;--o1:#fdae61;--r1:#f46d43;--r2:#d73027;--zero:#2b3742;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{padding:12px 18px;background:linear-gradient(180deg,#1b2530,#141b22);border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  header h1{font-size:16px;margin:0;font-weight:650}
  .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
  .badge.sample{background:var(--accent);color:#fff}
  .badge.real{background:#1a9850;color:#fff}
  .monthrow{display:flex;align-items:center;gap:6px}
  .monthrow button{padding:6px 12px;font-size:15px}
  .month{flex:1;text-align:center;font-weight:600;text-transform:capitalize}
  .sub{color:var(--muted);font-size:12px}
  select,button{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;cursor:pointer}
  button:hover,select:hover{border-color:#3d4f5e}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .layout{display:flex}
  .side{width:255px;min-width:255px;border-right:1px solid var(--line);padding:14px;height:calc(100vh - 56px);overflow:auto}
  .side h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:0 0 8px}
  .grp{margin:10px 0 4px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .opt{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:7px;cursor:pointer}
  .opt:hover{background:var(--panel2)}
  .opt input{accent-color:var(--accent);width:15px;height:15px}
  .opt label{cursor:pointer;font-size:13px}
  main{flex:1;padding:14px 18px;height:calc(100vh - 56px);overflow:auto}
  .note{background:rgba(200,71,43,.08);border:1px solid rgba(200,71,43,.3);color:#f0c2b5;border-radius:10px;padding:9px 12px;margin-bottom:14px;font-size:12.5px}
  .block{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:16px;overflow:auto}
  .bh{display:flex;flex-wrap:wrap;align-items:baseline;gap:10px;margin-bottom:10px}
  .bh .nm{font-weight:700;font-size:15px}
  .bh .tag{font-size:11px;color:var(--muted)}
  .pill{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .pill.ok{background:rgba(26,152,80,.18);color:#7ee0a3}
  .pill.low{background:rgba(253,174,97,.18);color:#fdc98b}
  .pill.no{background:rgba(215,48,39,.2);color:#f7a3a0}
  table{border-collapse:separate;border-spacing:0;font-size:12px}
  .rh{position:sticky;left:0;background:var(--panel2);text-align:left;padding:5px 10px 5px 4px;font-weight:600;white-space:nowrap;z-index:2;border-right:1px solid var(--line)}
  .ch{padding:4px 0;color:var(--muted);font-weight:600;text-align:center}
  .ch .dow{display:block;font-size:9px;color:#6a7e8e;font-weight:400}
  .cell{width:32px;height:28px;text-align:center;font-weight:700;font-size:11px;color:#08120c;border:1px solid rgba(0,0,0,.25);border-radius:3px}
  .cell.wknd{outline:1px dashed rgba(255,255,255,.07)}
  .cell.dead{background:repeating-linear-gradient(45deg,#222c35,#222c35 4px,#283440 4px,#283440 8px);color:#5b6b78}
  .legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:8px}
  .legend .sw{display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:-2px;margin-right:5px}
  .empty{color:var(--muted);text-align:center;padding:40px}
  .tip{position:fixed;pointer-events:none;background:#0b0f14;border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:12px;z-index:30;display:none;box-shadow:0 6px 18px rgba(0,0,0,.4)}
</style>
</head>
<body>
<header>
  <h1>🏔️ Disponibilidad Machu Picchu</h1>
  <span class="badge" id="srcbadge"></span>
</header>

<div class="layout">
  <aside class="side">
    <h3>Mes</h3>
    <div class="monthrow">
      <button id="prev">‹</button>
      <div class="month" id="monthlbl">—</div>
      <button id="next">›</button>
    </div>
    <button class="primary" id="refresh" style="width:100%;margin-top:8px">↻ Refrescar</button>
    <div class="sub" id="updated" style="margin:6px 0 16px"></div>
    <h3>Tipo de ticket</h3>
    <div class="sub" style="margin-bottom:8px">Marca uno o varios para comparar</div>
    <div id="picker"></div>
  </aside>
  <main>
    <div class="note" id="note"></div>
    <div id="blocks"></div>
  </main>
</div>
<div class="tip" id="tip"></div>

<script>
const DOW=["D","L","M","M","J","V","S"];
const MONTHS=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
let DATA=null, MODE="real", months=[], curIdx=0, selected=new Set();

function daysIn(y,m){return new Date(y,m+1,0).getDate();}
function pad(n){return String(n).padStart(2,'0');}

// ---- Fallback local (cuando se abre con doble clic y no carga data.json) ----
function buildSample(){
 const routes=[
  ["Circuito 1 — Panorámico","1B","Circuito 1-B · Terraza Superior",["06","07","08","09","10","11","12","13","14"],130],
  ["Circuito 1 — Panorámico","1A","Circuito 1-A · Montaña Machupicchu",["06","07","08"],55],
  ["Circuito 1 — Panorámico","1C","Circuito 1-C · Intipunku (Puerta del Sol)",["06","07","08","09","10"],60],
  ["Circuito 1 — Panorámico","1D","Circuito 1-D · Puente Inca",["06","07","08","09","10"],45],
  ["Circuito 2 — Clásico","2A","Circuito 2-A · Clásico diseñado",["06","07","08","09","10","11","12","13","14"],160],
  ["Circuito 2 — Clásico","2B","Circuito 2-B · Terraza Inferior",["07","08","09","10","11","12"],95],
  ["Circuito 3 — Realeza","3A","Circuito 3-A · Huayna Picchu",["07","08","09","10"],100],
  ["Circuito 3 — Realeza","3B","Circuito 3-B · Realeza diseñado",["06","07","08","09","10","11","12","13"],120],
  ["Circuito 3 — Realeza","3C","Circuito 3-C · Gran Caverna",["06","07","08"],50],
  ["Circuito 3 — Realeza","3D","Circuito 3-D · Huchuy Picchu",["07","08","09"],60],
 ];
 const rnd=s=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
 const mlist=[[2026,6],[2026,7],[2026,8]];
 const out={updated:new Date().toISOString(),sample:true,routes:[]};
 routes.forEach(([grp,id,nm,slots,cap])=>{
   const days={};
   mlist.forEach(([y,m])=>{for(let d=1;d<=daysIn(y,m);d++){
     const dow=new Date(y,m,d).getDay();const high=m===6||m===7;
     const seed=(id.charCodeAt(0)*31+id.charCodeAt(1))*1e5+(y*372+m*31+d)*17;
     let pdead=0.05+(high?0.12:0)+((dow===0||dow===6)?0.06:0)+(cap<70?0.1:0);
     const key=`${y}-${pad(m+1)}-${pad(d)}`;
     if(rnd(seed)<pdead){days[key]=null;continue;}
     const sm={};slots.forEach((s,i)=>{let dem=0.4+(high?0.25:0)+((dow===0||dow===6)?0.1:0)+(s<="09"?0.18:0);dem=Math.min(0.99,dem)*(0.55+0.85*rnd(seed+i*131));let c=Math.max(0,Math.round(cap*(1-dem)));if(rnd(seed*1.7+i)<0.12)c=0;sm[s]=c;});
     days[key]=sm;
   }});
   out.routes.push({id,group:grp,name:nm,slots,cap,days});
 });
 return out;
}

async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw 0;
    DATA=await r.json(); MODE = DATA.sample ? "sample-file" : "real";
  }catch(e){ DATA=buildSample(); MODE="local"; }
  // meses presentes
  const set=new Set();
  DATA.routes.forEach(rt=>Object.keys(rt.days).forEach(k=>set.add(k.slice(0,7))));
  months=[...set].sort();
  if(curIdx>=months.length) curIdx=0;
  if(!selected.size) selected=new Set(["2A","3A"].filter(id=>DATA.routes.some(r=>r.id===id)));
}

function srcBadge(){
  const b=document.getElementById("srcbadge");
  if(MODE==="real"){b.className="badge real";b.textContent="DATOS REALES";}
  else if(MODE==="sample-file"){b.className="badge sample";b.textContent="DATOS DE MUESTRA";}
  else {b.className="badge sample";b.textContent="MUESTRA (vista local)";}
}
function ago(iso){
  if(!iso) return "";
  const diff=(Date.now()-new Date(iso).getTime())/60000;
  if(diff<2) return "Actualizado: hace un momento";
  if(diff<90) return "Actualizado: hace "+Math.round(diff)+" min";
  return "Actualizado: hace "+Math.round(diff/60)+" h";
}
function color(v,cap){if(v<=0)return"var(--zero)";const r=v/cap;if(r>0.55)return"var(--g1)";if(r>0.4)return"var(--g2)";if(r>0.28)return"var(--g3)";if(r>0.18)return"var(--y1)";if(r>0.10)return"var(--o1)";if(r>0.03)return"var(--r1)";return"var(--r2)";}

function renderPicker(){
  const p=document.getElementById("picker");p.innerHTML="";let lastG="";
  DATA.routes.forEach(rt=>{
    if(rt.group!==lastG){lastG=rt.group;const g=document.createElement("div");g.className="grp";g.textContent=rt.group;p.appendChild(g);}
    const row=document.createElement("div");row.className="opt";
    row.innerHTML=`<input type="checkbox" id="c_${rt.id}" ${selected.has(rt.id)?"checked":""}><label for="c_${rt.id}">${rt.id} · ${rt.name.split('· ')[1]||rt.name}</label>`;
    row.querySelector("input").onchange=e=>{e.target.checked?selected.add(rt.id):selected.delete(rt.id);renderBlocks();};
    p.appendChild(row);
  });
}

function renderBlocks(){
  document.getElementById("note").innerHTML = (MODE==="real")
    ? "✅ Datos reales del sitio oficial. El botón <b>Refrescar</b> trae lo último guardado."
    : "👀 Datos de muestra para mostrar el formato. Cuando se conecte el robot, aquí saldrán los cupos reales.";
  document.getElementById("updated").textContent=ago(DATA.updated);
  srcBadge();
  if(!months.length){document.getElementById("blocks").innerHTML='<div class="empty">No hay datos cargados todavía.</div>';return;}
  const [Y,M]=months[curIdx].split('-').map(Number); const y=Y,m=M-1,nd=daysIn(y,m);
  document.getElementById("monthlbl").textContent=MONTHS[m]+" "+y;
  const host=document.getElementById("blocks");host.innerHTML="";
  const sel=DATA.routes.filter(r=>selected.has(r.id));
  if(!sel.length){host.innerHTML='<div class="empty">Selecciona al menos un tipo de ticket a la izquierda.</div>';return;}
  sel.forEach(rt=>{
    let diasCupo=0,diasAgot=0,prox=null;
    for(let d=1;d<=nd;d++){const sm=rt.days[`${y}-${pad(m+1)}-${pad(d)}`];if(sm){diasCupo++;if(prox===null)prox=d;}else diasAgot++;}
    const ratio=diasCupo/nd;
    const pill=ratio>0.7?'<span class="pill ok">holgado</span>':ratio>0.4?'<span class="pill low">ajustado</span>':'<span class="pill no">crítico</span>';
    const b=document.createElement("div");b.className="block";
    b.innerHTML=`<div class="bh"><span class="nm">${rt.id} · ${rt.name.split('· ')[1]||rt.name}</span> ${pill}
      <span class="tag">${diasCupo} días con cupo · ${diasAgot} agotados · próx. libre: ${prox?prox+' '+MONTHS[m]:'—'}</span></div>`;
    const t=document.createElement("table");
    let h="<tr><th class='rh'>Hora</th>";
    for(let d=1;d<=nd;d++){const dow=new Date(y,m,d).getDay();h+=`<th class='ch'>${d}<span class='dow'>${DOW[dow]}</span></th>`;}
    h+="</tr>";t.innerHTML=h;
    rt.slots.forEach(s=>{
      const tr=t.insertRow();const rh=tr.insertCell();rh.className="rh";rh.textContent=s+":00";
      for(let d=1;d<=nd;d++){
        const sm=rt.days[`${y}-${pad(m+1)}-${pad(d)}`];const dow=new Date(y,m,d).getDay();
        const td=tr.insertCell();td.className="cell"+((dow===0||dow===6)?" wknd":"");
        if(!sm){td.className+=" dead";}
        else{const v=sm[s]??0;td.style.background=color(v,rt.cap);td.textContent=v>0?v:"";
          td.dataset.tip=`${rt.id} · ${d} ${MONTHS[m]} · ${s}:00 · ${v} de ${rt.cap} cupos`;}
      }
    });
    b.appendChild(t);
    const lg=document.createElement("div");lg.className="legend";
    lg.innerHTML=`<span>Cupos por horario:</span>
      <span><i class="sw" style="background:var(--g1)"></i>Muchos</span>
      <span><i class="sw" style="background:var(--y1)"></i>Medios</span>
      <span><i class="sw" style="background:var(--r2)"></i>Pocos</span>
      <span><i class="sw" style="background:var(--zero)"></i>Horario agotado</span>
      <span><i class="sw" style="background:#283440"></i>Día agotado</span>`;
    b.appendChild(lg);
    host.appendChild(b);
  });
}

const tip=document.getElementById("tip");
document.addEventListener("mouseover",e=>{const t=e.target.dataset&&e.target.dataset.tip;if(t){tip.textContent=t;tip.style.display="block";}});
document.addEventListener("mousemove",e=>{if(tip.style.display==="block"){tip.style.left=(e.clientX+12)+"px";tip.style.top=(e.clientY+12)+"px";}});
document.addEventListener("mouseout",e=>{if(e.target.dataset&&e.target.dataset.tip)tip.style.display="none";});

document.getElementById("prev").onclick=()=>{if(curIdx>0){curIdx--;renderBlocks();}};
document.getElementById("next").onclick=()=>{if(curIdx<months.length-1){curIdx++;renderBlocks();}};
document.getElementById("refresh").onclick=async()=>{await loadData();renderPicker();renderBlocks();};

(async()=>{await loadData();renderPicker();renderBlocks();})();
</script>
</body>
</html>
